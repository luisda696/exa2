<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Pádel Manager Pro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header class="bg-blue-800 text-white p-4 shadow-md">
      <h1 class="text-2xl font-bold">Pádel Manager Pro</h1>
    </header>
    <main class="container mx-auto p-4">
      <div id="app-content"></div>
    </main>
  </div>

  <!-- Modales -->
  <div id="score-modal" class="modal" style="display:none">
    <div class="modal-content">
      <h3 class="text-lg font-bold mb-2">Registrar Resultado</h3>
      <div id="score-timer" class="text-right font-mono text-sm mb-2">00:00</div>
      <form id="score-form">
        <!-- Aquí se generan dinámicamente los campos -->
        <div id="score-fields"></div>
        <div class="flex justify-end gap-2 mt-4">
          <button type="button" id="score-cancel" class="btn">Cancelar</button>
          <button type="submit" id="score-save" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="confirm-modal" class="modal" style="display:none">
    <div class="modal-content">
      <p id="confirm-message">¿Estás seguro?</p>
      <div class="flex justify-end gap-2 mt-4">
        <button id="confirm-cancel" class="btn">Cancelar</button>
        <button id="confirm-ok" class="btn btn-primary">Aceptar</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
